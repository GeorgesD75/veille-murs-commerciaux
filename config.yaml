# =============================================================================
# Configuration de la veille — tout est modifiable à la main.
# Le scoring étant recalculé à chaque run, un changement ici re-score tout le stock.
# =============================================================================

budget:
  prix_min: 150000            # budget cible net vendeur
  prix_max: 400000
  prix_min_filtre: 140000     # bornes élargies (~±7 %) : marge de négociation
  prix_max_filtre: 420000

zone:
  temps_trajet_max_min: 60    # temps de transport max depuis Paris 18e

filtres:
  # Piège n°1 : fonds de commerce / droit au bail déguisés en vente de murs.
  mots_toujours_eliminatoires:
    - "fonds de commerce"
    - "fond de commerce"     # faute courante dans les annonces réelles (constatée
    - "cession de fond"      # sur une annonce notariale du 2026-07-10) : sans ces
    - "cession de fonds"     # variantes sans « s », le piège n°1 passait le filtre
    - "cession du fonds"
    - "cession du fond"
    - "droit au bail"
  # Éliminatoires SAUF si le mot « murs » apparaît explicitement dans l'annonce.
  mots_eliminatoires_sauf_murs:
    - "pas de porte"
    - "pas-de-porte"
    - "cause retraite"
    - "licence iv"
  # Contrôle de cohérence : un prix/m² anormalement bas trahit un fonds déguisé.
  prix_m2_plancher_paris: 2200             # Paris intra-muros
  prix_m2_plancher_petite_couronne: 1500   # 92, 93, 94
  prix_m2_plancher_grande_couronne: 800    # 77, 78, 91, 95

deduplication:
  tolerance_surface_m2: 3     # même bien probable si surface ±3 m²…
  tolerance_prix_pct: 5       # …et prix ±5 % (et même code postal)

scoring:
  # Barème total = 100 : rendement 37 + emplacement 25 + prix vs marché 18 +
  # financement 5 + fiscalité 5 + proximité 3 + quartier 2 + bonus/malus 5.
  # (rééquilibrage 2026-07-11 demandé par l'utilisateur : trajet et quartier 18e
  # pesaient 10 pts pour des critères de confort — les 5 pts libérés renforcent
  # les deux critères qui décident vraiment d'un achat : le rendement et le
  # prix face au marché — voir test_bareme_total_fait_cent)
  rendement:                  # 37 pts max, linéaire entre plancher et plafond
    points: 37
    pct_plancher: 4           # ≤ 4 % de rendement brut -> 0 pt
    pct_plafond: 9            # ≥ 9 % -> 35 pts
  penalite_loyer_estime: 10   # murs libres (référentiel de zone générique, ou promesse du
                              # vendeur) : forte incertitude + vacance
  penalite_loyer_estime_comparables: 4   # murs libres estimés via ≥ 2 baux RÉELS voisins
                              # (même code postal) : bien plus fiable qu'une moyenne de zone
  emplacement:                # 25 pts max
    paris: 25
    petite_couronne_dynamique: 20
    petite_couronne: 15
    grande_couronne_centre_ville: 10
    autre: 5
  communes_dynamiques:        # petite couronne « dynamique » (20 pts)
    - Pantin
    - Aubervilliers
    - Saint-Ouen
    - Saint-Ouen-sur-Seine
    - Saint-Denis
    - Montreuil
    - Clichy
    - Levallois-Perret
    - Bagnolet
    - Les Lilas
    - Ivry-sur-Seine
  prix_m2_vs_benchmark:       # 18 pts max, vs data/benchmarks.json
    seuil_decote_pct: 20      # décote ≥ 20 % sous le prix médian -> 18 pts
    decote_forte: 18
    dans_fourchette: 8
    surcote: 0
    inconnu: 0
  financement:                # 5 pts : le bien s'autofinance-t-il à l'apport et au taux
                              # DE RÉFÉRENCE (fixes — pas le profil personnel affiché sur
                              # le dashboard, pour rester comparable d'un bien à l'autre) ?
    points: 5
    apport_reference_pct: 20
    tolerance_deficit_pct: 10 # déficit < 10 % du loyer = encore finançable de justesse (3 pts)
  fiscalite:                  # 5 pts : signaux fiscaux détectés dans l'annonce — neutre
                              # (2,5 pts) quand rien n'est mentionné, une info absente
                              # n'étant pas une mauvaise nouvelle en soi
    points: 5
    base_neutre: 2.5
    regles:
      - nom: tva_recuperable
        points: 1.5
        mots: ["tva récupérable", "assujetti à la tva", "récupération de tva"]
      - nom: avantage_fiscal_zone
        points: 1.5
        mots: ["zone franche urbaine", "zfu", "qpv", "exonération de taxe foncière"]
      - nom: taxe_fonciere_elevee
        points: -1.5
        mots: ["taxe foncière élevée", "taxe foncière importante", "forte taxe foncière"]
  proximite:                  # 3 pts max, temps de trajet depuis la rue Francoeur (18e)
    moins_de_20_min: 3
    de_20_a_40_min: 2
    de_40_a_60_min: 1
  rue:                         # emplacement RUE PAR RUE (gratuit, sans clé) : Base Adresse
                                # Nationale (géocodage) + OpenStreetMap/Overpass (densité de
                                # commerces à 150 m) — ajuste le palier administratif ci-dessus
                                # sans jamais dépasser son enveloppe (25 pts). Seulement quand
                                # un nom de rue explicite figure dans l'annonce (jamais deviné).
    ajustement:
      tres_commercante: 4      # ≥ 15 commerces actifs à 150 m
      commercante: 2           # 8 à 14
      calme: 0                 # 3 à 7
      peu_commercante: -4      # 0 à 2 : rue isolée, peu de passage commercial
    malus_vacance_seuil: 3     # à partir de N locaux vacants/fermés à 150 m…
    malus_vacance_points: -3   # …signal de vacance commerciale du secteur
    max_par_run: 20            # limite de requêtes API par tournée (politesse + Overpass
                                # est un service public parfois saturé)
    budget_secondes: 120       # garde-fou de TEMPS : Overpass peut être lent à échouer ;
                                # on s'arrête net au budget plutôt que de rallonger la
                                # tournée (3 fois/jour, ne doit jamais bloquer la suivante)
  quartier:                   # 2 pts : attachement au 18e, économie locale
    points: 2
    codes_postaux: ["75018"]
  bonus_malus:                # somme bornée à [-3 ; +5]
    - nom: bail_recent
      points: 2
      mots: ["bail récent", "nouveau bail", "bail neuf", "bail signé"]
    - nom: taxe_fonciere_locataire
      points: 2
      mots: ["taxe foncière à la charge du locataire", "taxe foncière au locataire", "taxe foncière refacturée"]
    - nom: charges_au_locataire  # bail où les grosses charges (article 606, triple net)
      points: 1                  # pèsent sur le locataire : cash-flow bien plus prévisible
      mots: ["article 606", "606 à la charge du locataire", "triple net",
             "toutes charges au locataire", "charges refacturées au locataire"]
    - nom: enseigne_nationale
      points: 1
      mots: ["enseigne nationale", "locataire national", "franchise nationale"]
    - nom: travaux
      points: -3
      mots: ["travaux à prévoir", "prévoir des travaux", "à rénover", "gros travaux"]
    - nom: dette_copropriete   # information vitale : l'acheteur hérite de la quote-part
      points: -3               # de dette au prorata — se négocie, mais ne se découvre pas après coup
      mots: ["dette de copropriété", "dettes de copropriété", "charges impayées",
             "impayés de charges", "copropriété en difficulté", "procédure de copropriété",
             "carence de copropriété", "syndic judiciaire", "administrateur provisoire"]
  dpe:                        # classe énergie annoncée (volet E de l'ESG, le seul qui a de
                              # vraies dents financières à cette échelle) — dans l'enveloppe
                              # bonus/malus. Honnêteté réglementaire : les interdictions de
                              # location F/G visent les LOGEMENTS, pas les baux commerciaux ;
                              # mais une passoire se paie en charges du locataire, en décote
                              # de revente et en frilosité bancaire. Non mentionné = neutre.
    malus_passoire: -2        # DPE F ou G
    bonus_vertueux: 1         # DPE A ou B
  seuil_alerte_rendement_pct: 10   # au-delà : ⚠️ « vérifier locataire et quartier » (pas un bonus)
  seuils:
    pepite: 80                # score ≥ 80 -> email immédiat 🔥
    vert: 75                  # ≥ vert -> « le haut du panier »
    orange: 60
    affichage: 65             # sous ce score, l'annonce est repliée dans « le reste du marché »
                              # (65 : « à étudier de près » ne montre pas de dossiers médiocres)

sources:                      # activer/désactiver une source = une ligne
  mock:            {actif: false}   # données de démonstration (tests/démo Phase 1)
  pointdevente:    {actif: true, max_pages: 3}   # 3 pages × 50 annonces, tri récentes d'abord
  murscommerciaux: {actif: true}
  iburoshop:       {actif: true}
  flagship:        {actif: true}
  papcommerces:    {actif: true}   # site commerces de PAP, listing IdF
  bienici:         {actif: true, max_annonces: 100}   # API JSON, boutiques triées par date
  cessionpme:      {actif: true}   # listing « vente locaux commerciaux IdF » (1 000+ annonces)
  geolocaux:       {actif: true, prix_max: 420000}   # pages communales SSR découvertes via les pages
                                   # département ; prix_max (= prix_max_filtre) épargne les communes hors budget
  bureauxlocaux:   {actif: true, max_pages: 5}   # JSON react-context par département IdF ; is_occupied /
                                   # is_sale_of_business_assets structurés (pas de mots-clés à deviner)
  encheres_publiques: {actif: true}  # enchères IdF — canal spécial sans scoring (mise à prix ≠ prix)
  # placedescommerces.com écarté : marché de fonds de commerce, pas de murs.
  # licitor.com : résultats chargés en AJAX, à réétudier si besoin (l'appli mobile a une API).
  # Facebook Marketplace : accès authentifié + anti-bot, pas de contournement propre.
  # century21 : non implémenté en scraping (robots.txt restrictif, rubrique commerces
  # non identifiable sans blocage) — couvert par les alertes email ci-dessous.
  notaires:        {actif: true, max_pages: 5}  # API JSON publique des études notariales —
                                    # volume IdF faible mais annonces quasi off-market,
                                    # données de confiance (prix du mandat, INSEE, bienVendu)
  imap:            {actif: true}    # alertes email LeBonCoin/SeLoger/Geolocaux/BureauxLocaux
                                    # (s'ignore proprement tant que IMAP_USER/IMAP_PASSWORD manquent)

encheres:                     # score d'INTÉRÊT dédié aux enchères (le prix final
                              # est imprévisible : on ne le prédit pas)
  seuil_occasion: 65          # score enchère minimal pour être une « occasion »
  max_haut_panier: 5          # nb maximal d'occasions remontées en haut de page — un score
                              # d'enchère est un signal d'intérêt, pas un vrai classement
                              # comparable aux annonces classiques : mieux vaut en montrer
                              # plus que risquer de noyer une bonne affaire dans « Sous le marteau »

analyse:
  rendement_cible_pct: 7      # plancher de rentabilité : loyer annuel ÷ cible
  negociation_usage_pct: 7    # première offre d'usage quand le prix est déjà bon (−7 %)
  financement:                # hypothèses du cash-flow indicatif (crédit 100 %)
    taux_pct: 3.9              # repli si le taux de marché (ci-dessous) est indisponible
    duree_ans: 20
    marge_credit_pro_pct: 0.9  # marge bancaire typique ajoutée à l'OAT France pour
                               # approcher un taux de crédit professionnel (estimation,
                               # pas une offre réelle) — taux_pct est ACTUALISÉ à chaque
                               # tournée à partir de ce référentiel (pipeline/taux_marche.py)
  dossier_banque:             # classeurs Excel « à présenter au banquier »
    seuil_score: 60           # généré pour toute annonce retenue à score ≥ seuil
    apport_pct: 20            # hypothèses par défaut du classeur — toutes
    frais_acquisition_pct: 8  # modifiables dans Excel (cellules jaunes)
    taxe_fonciere_mois_loyer: 1
    provision_entretien_pct: 5
    assurance_pno_eur_an: 300
  critique_ia:                # critique sceptique générée par Claude Haiku (pipeline/critique.py)
    seuil_score: 60           # générée une seule fois par annonce retenue à score ≥ seuil
    max_par_run: 15           # plafond d'appels API par tournée (coût + temps) ; sans
                              # ANTHROPIC_API_KEY, la fonctionnalité s'ignore proprement
  dvf:                        # ventes réelles de locaux commerciaux (pipeline/dvf.py) : la
                              # fourchette de prix d'un secteur vient des prix PAYÉS chez le
                              # notaire quand la commune compte assez de ventes
    actif: true
    ventes_minimum: 6         # en dessous, une « médiane » n'en est pas une : référentiel interne
    annees: [2023, 2024, 2025]
    max_communes_par_run: 12  # politesse : quelques communes rafraîchies par tournée, cache 30 j

notifications:
  fournisseur: resend
  email_quotidien: false      # désactivé : uniquement l'alerte pépite (score ≥ seuil pépite)
  max_annonces_email: 5
  url_dashboard: "https://georgesd75.github.io/veille-murs-commerciaux/"
