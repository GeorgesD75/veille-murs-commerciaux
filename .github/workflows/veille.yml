# La tournée : GitHub exécute ce fichier tout seul, c'est le « serveur
# gratuit » du projet. Elle collecte, filtre, score, régénère le site et envoie
# les emails s'il y a du nouveau, puis committe les données mises à jour.
name: Veille quotidienne

on:
  workflow_dispatch:       # bouton « Run workflow » pour lancer à la main
  schedule:
    # 3 tournées/jour (~07:17, 15:17, 23:17 à Paris l'été — cron en UTC) :
    # matin pour le café, après-midi pour les annonces de la journée, soir
    # pour ne rien rater la nuit. Minute creuse volontaire : les crons
    # « minute 0 » sont si demandés que GitHub les retarde de plusieurs
    # heures, voire les saute (constaté les 5 et 6 juillet 2026).
    - cron: "17 5,13,21 * * *"

permissions:
  contents: write          # nécessaire pour committer données + site

concurrency:
  group: veille
  cancel-in-progress: false

jobs:
  tournee:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Tests de santé (30 s)
        run: python -m pytest -q

      - name: Tournée du matin
        env:
          IMAP_USER: ${{ secrets.IMAP_USER }}
          IMAP_PASSWORD: ${{ secrets.IMAP_PASSWORD }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python run.py

      - name: Publier les données et le site
        run: |
          git config user.name "veille-bot"
          git config user.email "github-actions@users.noreply.github.com"
          git add data/annonces.json docs/
          if git diff --staged --quiet; then
            echo "Rien de nouveau à publier."
          else
            git commit -m "Tournée du $(date -u +%F)"
            git push
          fi
